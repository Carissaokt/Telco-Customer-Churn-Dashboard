<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Telco Customer Churn Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <!-- NAVBAR -->
    <nav>
        <div class="container nav-wrapper">
            <a href="/" class="brand">Telco Churn Analytics</a>

            <ul class="nav-links">
                <li>
                    <a href="/"
                    class="{% if request.path == '/' %}active{% endif %}">
                    Home
                    </a>
                </li>

                <li>
                    <a href="/dashboard"
                    class="{% if request.path == '/dashboard' %}active{% endif %}">
                    Dashboard
                    </a>
                </li>

                <li>
                    <a href="/predict"
                    class="{% if request.path == '/predict' %}active{% endif %}">
                    Prediksi
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2026 Telco Customer Churn Analysis Dashboard</p>
        <p>Data-driven retention insights untuk bisnis Telco</p>
    </footer>
</body>
</html>
